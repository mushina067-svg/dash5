<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="W·Dashboard">
<meta name="theme-color" content="#050d1a">
<title>Wottrich · Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg:#050d1a; --surf:#0a1628; --surf2:#0f1f35; --surf3:#162845;
  --b1:rgba(255,255,255,.06); --b2:rgba(255,255,255,.11); --b3:rgba(255,255,255,.18);
  --text:#e8edf5; --muted:#6b7fa0; --faint:#2d3f5a;
  --green:#00d46e; --gd:rgba(0,212,110,.1); --gb:rgba(0,212,110,.35);
  --blue:#3b9eff; --bd:rgba(59,158,255,.1); --bb:rgba(59,158,255,.35);
  --red:#ff4f6b; --rd:rgba(255,79,107,.1); --rb:rgba(255,79,107,.35);
  --amber:#ffb020; --ad:rgba(255,176,32,.1); --ab:rgba(255,176,32,.35);
  --purple:#9d6fff; --pd:rgba(157,111,255,.1);
  --navy:#0d1f35;
  --mono:'DM Mono',monospace;
  --head:'Syne',sans-serif;
  --body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overflow:hidden;}
body{display:flex;flex-direction:column;}

/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:.5px solid var(--b1);background:var(--surf);flex-shrink:0;position:relative;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--green),transparent);}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--navy),#1a3a6b);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:.5px solid var(--bb);}
.hdr-title{font-family:var(--head);font-size:16px;font-weight:700;letter-spacing:-.3px;}
.hdr-title span{color:var(--blue);}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:.5px;}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-import{padding:7px 14px;border-radius:6px;border:.5px solid var(--gb);background:var(--gd);color:var(--green);font-size:12px;cursor:pointer;font-family:var(--body);font-weight:500;display:flex;align-items:center;gap:6px;}
.btn-import:active{transform:scale(.97);}
.btn-export-db{padding:7px 12px;border-radius:6px;border:.5px solid var(--b2);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--body);}

/* TABS */
.tabs{display:flex;border-bottom:.5px solid var(--b1);background:var(--surf);flex-shrink:0;}
.tab{flex:1;padding:10px 0;font-size:12px;font-family:var(--body);font-weight:500;text-align:center;cursor:pointer;background:none;border:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-.5px;letter-spacing:.3px;}
.tab.active{color:var(--text);border-bottom-color:var(--blue);}

/* VIEWS */
.view{flex:1;overflow:hidden;display:none;}
.view.active{display:flex;flex-direction:column;}
.scroll{flex:1;overflow-y:auto;padding:20px;}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;padding:2rem;text-align:center;}
.empty-icon{font-size:48px;opacity:.3;}
.empty-title{font-family:var(--head);font-size:20px;font-weight:700;color:var(--muted);}
.empty-sub{font-size:13px;color:var(--faint);max-width:320px;line-height:1.6;}
.btn-big-import{padding:12px 24px;border-radius:8px;border:.5px solid var(--gb);background:var(--gd);color:var(--green);font-size:14px;cursor:pointer;font-family:var(--body);font-weight:500;}

/* SWIMMER GRID */
.swimmer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.sw-card{background:var(--surf);border:.5px solid var(--b1);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;}
.sw-card:hover{border-color:var(--b2);transform:translateY(-2px);}
.sw-card:active{transform:scale(.98);}
.sw-card-top{padding:16px;display:flex;align-items:center;gap:12px;}
.sw-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.sw-name{font-family:var(--head);font-size:16px;font-weight:600;}
.sw-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.sw-stats-row{display:flex;border-top:.5px solid var(--b1);}
.sw-stat{flex:1;padding:10px 14px;text-align:center;border-right:.5px solid var(--b1);}
.sw-stat:last-child{border-right:none;}
.sw-stat-val{font-family:var(--mono);font-size:16px;font-weight:500;}
.sw-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.sw-stat-val.good{color:var(--green);}
.sw-stat-val.warn{color:var(--amber);}
.sw-stat-val.bad{color:var(--red);}

/* SWIMMER DETAIL */
.detail-header{background:var(--surf);border-bottom:.5px solid var(--b1);padding:16px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.btn-back{padding:6px 12px;border-radius:6px;border:.5px solid var(--b2);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--body);}
.detail-name{font-family:var(--head);font-size:20px;font-weight:700;}
.detail-meta{font-size:11px;color:var(--muted);}
.detail-actions{margin-left:auto;display:flex;gap:8px;}
.btn-action{padding:7px 14px;border-radius:6px;border:.5px solid var(--b2);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--body);}
.btn-action.primary{border-color:var(--bb);background:var(--bd);color:var(--blue);}

/* STATS CARDS ROW */
.stats-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:120px;background:var(--surf);border:.5px solid var(--b1);border-radius:10px;padding:14px 16px;}
.stat-card-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--text);}
.stat-card-val.g{color:var(--green);}
.stat-card-val.a{color:var(--amber);}
.stat-card-val.r{color:var(--red);}
.stat-card-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}

/* CHARTS */
.chart-card{background:var(--surf);border:.5px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:14px;}
.chart-title{font-family:var(--head);font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text);}
.chart-subtitle{font-size:11px;color:var(--muted);margin-bottom:12px;}
.chart-wrap{position:relative;height:200px;}

/* SESSION LIST */
.session-item{background:var(--surf);border:.5px solid var(--b1);border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.session-item:hover{border-color:var(--b2);}
.sess-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.sess-date{font-size:12px;color:var(--muted);}
.sess-type{font-size:11px;color:var(--blue);font-weight:500;}
.sess-blocks{display:flex;gap:6px;flex-wrap:wrap;}
.sess-chip{background:var(--surf2);border-radius:4px;padding:3px 8px;font-size:11px;}
.sess-chip .pct{font-family:var(--mono);font-weight:500;}
.sess-chip .pct.g{color:var(--green);}
.sess-chip .pct.a{color:var(--amber);}
.sess-chip .pct.b{color:var(--red);}

/* SESSION DETAIL MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,13,26,.9);z-index:100;overflow-y:auto;padding:20px;}
.modal-overlay.open{display:flex;flex-direction:column;align-items:center;}
.modal-box{background:var(--surf);border:.5px solid var(--b2);border-radius:14px;width:100%;max-width:700px;overflow:hidden;}
.modal-hdr{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:.5px solid var(--b1);}
.modal-title{font-family:var(--head);font-size:16px;font-weight:600;flex:1;}
.btn-close{background:none;border:.5px solid var(--b2);border-radius:6px;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 10px;line-height:1.4;}
.modal-body{padding:20px;}

/* REP TABLE */
.section-label{font-family:var(--head);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:14px 0 6px;padding-left:2px;}
.section-label:first-child{margin-top:0;}
.rep-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:6px;}
.rep-tbl th{padding:5px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:.5px solid var(--b1);font-weight:500;}
.rep-tbl td{padding:5px 8px;border-bottom:.5px solid var(--b1);font-family:var(--mono);}
.rep-tbl tr:last-child td{border-bottom:none;}
.rep-tbl tr.ok td{background:rgba(0,212,110,.04);}
.rep-tbl tr.bad td{background:rgba(255,79,107,.04);}
.ok-v{color:var(--green);font-weight:500;}
.warn-v{color:var(--amber);font-weight:500;}
.bad-v{color:var(--red);font-weight:500;}

/* PROGRESSION */
.prog-controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.prog-sel{padding:7px 12px;border-radius:6px;border:.5px solid var(--b2);background:var(--surf2);color:var(--text);font-size:12px;font-family:var(--body);appearance:none;-webkit-appearance:none;cursor:pointer;}
.prog-btn{padding:7px 14px;border-radius:6px;border:.5px solid var(--bb);background:var(--bd);color:var(--blue);font-size:12px;cursor:pointer;font-family:var(--body);font-weight:500;}

/* IMPORT FEEDBACK */
.import-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surf2);border:.5px solid var(--gb);border-radius:8px;padding:10px 20px;font-size:13px;color:var(--green);z-index:200;display:none;animation:fadeup .3s ease;}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* SLBL */
.slbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 10px;font-weight:600;}
.slbl:first-child{margin-top:0;}

/* MONTH GROUP */
.month-group{margin-bottom:20px;}
.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.month-title{font-family:var(--head);font-size:13px;font-weight:700;color:var(--blue);letter-spacing:.5px;}
.month-count{font-size:10px;color:var(--muted);}

/* COMP FORM */
.comp-form{background:var(--surf);border:.5px solid var(--b1);border-radius:10px;padding:16px;margin-bottom:16px;}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.form-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.form-field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.form-inp{padding:8px 10px;border-radius:6px;border:.5px solid var(--b2);background:var(--surf2);color:var(--text);font-size:13px;font-family:var(--mono);-webkit-appearance:none;}
.form-inp:focus{border-color:var(--bb);outline:none;}
.btn-add-comp{padding:9px 16px;border-radius:6px;border:.5px solid var(--gb);background:var(--gd);color:var(--green);font-size:13px;cursor:pointer;font-family:var(--body);font-weight:500;}
.comp-item{background:var(--surf);border:.5px solid var(--b1);border-radius:8px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;}
.comp-badge{width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;}
.comp-info{flex:1;}
.comp-name{font-size:13px;font-weight:500;}
.comp-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.comp-time{font-family:var(--mono);font-size:16px;color:var(--amber);font-weight:500;}
.comp-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;}

/* PDF PRINT */
@media print {
  body>*:not(#pdf-print-area){display:none!important;}
  #pdf-print-area{display:block!important;position:static!important;overflow:visible!important;}
  .pdf-no-print{display:none!important;}
}

/* PROFILE EDIT */
.profile-edit{background:var(--surf);border:.5px solid var(--b1);border-radius:10px;padding:16px;margin-bottom:14px;}
.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:12px;}
.profile-field{display:flex;flex-direction:column;gap:4px;}
.profile-field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.profile-field input,.profile-field select{padding:7px 10px;border-radius:6px;border:.5px solid var(--b2);background:var(--surf2);color:var(--text);font-size:13px;font-family:var(--mono);-webkit-appearance:none;}
.profile-field input:focus{border-color:var(--bb);outline:none;}
.btn-save-profile{padding:8px 16px;border-radius:6px;border:.5px solid var(--gb);background:var(--gd);color:var(--green);font-size:12px;cursor:pointer;font-family:var(--body);font-weight:500;}
.profile-bio{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.profile-big-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.bio-stats{display:flex;gap:16px;}
.bio-stat{text-align:center;}
.bio-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);}
.bio-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:1px;}

/* CONTROL TIMES */
.ctrl-form{background:var(--surf);border:.5px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:12px;}
.ctrl-item{background:var(--surf);border:.5px solid var(--b1);border-radius:8px;padding:10px 14px;margin-bottom:5px;display:flex;align-items:center;gap:10px;}
.ctrl-date{font-size:11px;color:var(--muted);min-width:80px;}
.ctrl-dist{font-size:12px;font-weight:500;color:var(--text);flex:1;}
.ctrl-time{font-family:var(--mono);font-size:16px;color:var(--amber);font-weight:500;}
.ctrl-note{font-size:11px;color:var(--faint);font-style:italic;}
.ctrl-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;line-height:1;}
.ctrl-group-hdr{font-size:10px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:10px 0 5px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <svg viewBox="0 0 30 30" width="22" height="22">
      <polyline points="2,15 6,15 8,10 10,20 12,12 14,18 16,15 20,15 21.5,11 23,19 24.5,12 26,18 28,15" fill="none" stroke="#3b9eff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div>
    <div class="hdr-title">Wottrich · <span>Dashboard</span></div>
    <div class="hdr-sub">ANÁLISIS DE RENDIMIENTO</div>
  </div>
  <div class="hdr-right">
    <button class="btn-export-db" id="btn-export-db">↓ Backup JSON</button>
    <label class="btn-import" id="btn-import-db-lbl">
      ↑ Importar JSON
      <input type="file" id="inp-import-db" accept=".json" style="display:none">
    </label>
    <label class="btn-import" id="btn-import-lbl">
      ＋ Importar Excel
      <input type="file" id="inp-import-xlsx" accept=".xlsx" style="display:none">
    </label>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-swimmers" onclick="showTab('swimmers')">Nadadores</button>
  <button class="tab" id="tab-sessions" onclick="showTab('sessions')">Sesiones</button>
  <button class="tab" id="tab-progress" onclick="showTab('progress')">Progresión</button>
  <button class="tab" id="tab-competitions" onclick="showTab('competitions')">Competencias</button>
</div>

<!-- SWIMMERS -->
<div class="view active" id="view-swimmers">
  <div class="scroll" id="swimmers-content"></div>
</div>

<!-- SESSIONS -->
<div class="view" id="view-sessions">
  <div class="scroll" id="sessions-content"></div>
</div>

<!-- PROGRESS -->
<div class="view" id="view-progress">
  <div class="scroll" id="progress-content"></div>
</div>

<!-- SWIMMER DETAIL VIEW -->
<div class="view" id="view-detail">
  <div class="detail-header" id="detail-header"></div>
  <div class="scroll" id="detail-content"></div>
</div>

<!-- COMPETENCIAS -->
<div class="view" id="view-competitions">
  <div class="scroll" id="competitions-content"></div>
</div>

<!-- PDF PRINT AREA -->
<div id="pdf-print-area" style="display:none;position:fixed;inset:0;background:#fff;z-index:9999;overflow-y:auto;"></div>

<!-- SESSION MODAL -->
<div class="modal-overlay" id="session-modal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title" id="modal-title"></div>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="import-toast" id="import-toast"></div>

<script>
// ── DATA STORE ────────────────────────────────────────────────────
var DB = {swimmers:{}};
// swimmers[name] = { name, sessions:[] }
// session = { id, date, sessionType, phase, blocks:[] }
// block = { name, type, distance, targetMs, reps:[] }
// rep = { n, time, targetMs, comp:{diffStr,pctStr}, restTime }

function saveDB(){try{localStorage.setItem('w-dashboard',JSON.stringify(DB));}catch(e){}}
function loadDB(){try{var d=localStorage.getItem('w-dashboard');if(d)DB=JSON.parse(d);}catch(e){}}
loadDB();

// ── XLSX IMPORT ───────────────────────────────────────────────────
document.getElementById('inp-import-xlsx').addEventListener('change',function(){
  var file=this.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var imported=importFromXLSX(wb,file.name);
      saveDB();renderAll();
      toast('✓ '+imported.swimmer+' — '+imported.sessions+' sesión(es) importada(s)');
    }catch(err){toast('Error: '+err.message,true);}
  };
  reader.readAsArrayBuffer(file);
  this.value='';
});

function importFromXLSX(wb,filename){
  // Detect swimmer name from sheet names like "Mariano Resumen"
  var resSheet=wb.SheetNames.find(function(n){return n.indexOf('Resumen')!==-1;});
  var detSheet=wb.SheetNames.find(function(n){return n.indexOf('Detalle')!==-1;});
  if(!resSheet||!detSheet)throw new Error('Formato incorrecto. Debe tener hojas Resumen y Detalle.');

  var swName=resSheet.replace(' Resumen','').trim();
  var wsRes=wb.Sheets[resSheet];
  var wsDet=wb.Sheets[detSheet];
  var resRows=XLSX.utils.sheet_to_json(wsRes,{header:1,defval:null});
  var detRows=XLSX.utils.sheet_to_json(wsDet,{header:1,defval:null});

  // Parse header info
  var dateVal='',typeVal='',phaseVal='';
  resRows.forEach(function(r){
    if(r[0]==='Fecha')dateVal=String(r[1]||'');
    if(r[0]==='Tipo de sesión')typeVal=String(r[1]||'');
    if(r[0]==='Fase')phaseVal=String(r[1]||'');
  });

  // Parse detail sheet — handles both old format (Atleta col) and new format (section markers)
  var sections={};
  var curSec='CALENTAMIENTO'; // default
  var inData=false;
  var isOldFormat=false;

  // Detect format: old format has "Atleta" as first col header with no section markers
  detRows.forEach(function(r){
    if(!r)return;
    var first=String(r[0]||'').trim();
    if(first==='Atleta')isOldFormat=true;
  });

  detRows.forEach(function(r){
    if(!r||r.every(function(v){return v===null;}))return;
    var first=String(r[0]||'').trim();
    if(first==='CALENTAMIENTO'||first==='PRE-SERIE'||first==='SERIE'){
      curSec=first;if(!sections[curSec])sections[curSec]=[];inData=false;return;
    }
    if(first==='Sub-bloque'){inData=true;return;}
    if(first==='Atleta'){inData=true;isOldFormat=true;return;} // old format
    if(first==='Daniel Wottrich, ASCA L5 | Wottrich Coaching')return;
    if(first.indexOf('DETALLE DE REPETICIONES')!==-1)return;
    if(!inData)return;
    if(!sections[curSec])sections[curSec]=[];

    if(isOldFormat){
      // Old: Atleta(0), Bloque(1), Distancia(2), Rep#(3), Tiempo(4), Objetivo(5), Dif(6), %(7), Estado(8), Descanso(9)
      var blName=String(r[1]||'');
      var secGuess='CALENTAMIENTO';
      if(blName.toLowerCase().indexOf('pre')!==-1||blName.toLowerCase().indexOf('preserie')!==-1)secGuess='PRE-SERIE';
      else if(blName.toLowerCase().indexOf('calent')!==-1)secGuess='CALENTAMIENTO';
      else if(blName.toLowerCase().indexOf('serie')!==-1||blName.toLowerCase().indexOf('velocidad')!==-1||blName.toLowerCase().indexOf('rv')!==-1)secGuess='SERIE';
      if(!sections[secGuess])sections[secGuess]=[];
      sections[secGuess].push({
        subBloque:blName,
        distancia:String(r[2]||''),
        repN:parseInt(r[3])||0,
        tiempo:String(r[4]||''),
        objetivo:String(r[5]||''),
        diferencia:String(r[6]||''),
        pct:String(r[7]||''),
        estado:String(r[8]||''),
        descanso:String(r[9]||'')
      });
    } else {
      // New: Sub-bloque(0), Distancia(1), Rep#(2), Tiempo(3), Objetivo(4), Dif(5), %(6), Estado(7), Descanso(8)
      sections[curSec].push({
        subBloque:String(r[0]||''),
        distancia:String(r[1]||''),
        repN:parseInt(r[2])||0,
        tiempo:String(r[3]||''),
        objetivo:String(r[4]||''),
        diferencia:String(r[5]||''),
        pct:String(r[6]||''),
        estado:String(r[7]||''),
        descanso:String(r[8]||'')
      });
    }
  });

  // Build blocks structure
  var blocks=[];
  ['CALENTAMIENTO','PRE-SERIE','SERIE'].forEach(function(secName){
    if(!sections[secName]||!sections[secName].length)return;
    // Group by sub-bloque name
    var subGroups={};var order=[];
    sections[secName].forEach(function(r){
      var key=r.subBloque+'||'+r.distancia;
      if(!subGroups[key]){subGroups[key]={name:r.subBloque,distance:r.distancia,type:secName==='CALENTAMIENTO'?'warmup':secName==='PRE-SERIE'?'preserie':'velocity',reps:[]};order.push(key);}
      var pctNum=parseFloat(r.pct)||0;
      var targetMs=parseTime(r.objetivo);
      var timeMs=parseTime(r.tiempo);
      var diff=timeMs&&targetMs?timeMs-targetMs:0;
      subGroups[key].reps.push({
        n:r.repN,
        time:timeMs,
        targetMs:targetMs,
        comp:pctNum>0?{pctStr:r.pct,diffStr:r.diferencia}:null,
        restTime:parseTime(r.descanso),
        estado:r.estado
      });
    });
    order.forEach(function(k){blocks.push(subGroups[k]);});
  });

  // Create session
  var session={
    id:Date.now()+Math.random(),
    date:dateVal,
    sessionType:typeVal,
    phase:phaseVal,
    filename:filename,
    blocks:blocks
  };

  if(!DB.swimmers[swName])DB.swimmers[swName]={name:swName,sessions:[]};
  // Avoid duplicates by date+type
  var dup=DB.swimmers[swName].sessions.find(function(s){return s.date===dateVal&&s.sessionType===typeVal;});
  if(!dup)DB.swimmers[swName].sessions.unshift(session);
  else Object.assign(dup,session);

  return{swimmer:swName,sessions:1};
}

function parseTime(str){
  if(!str||str==='—'||str==='null')return 0;
  str=String(str).trim().replace('s','');
  if(str.indexOf(':')!==-1){
    var p=str.split(':');
    return Math.round((parseFloat(p[0]||0)*60+parseFloat(p[1]||0))*1000);
  }
  return Math.round(parseFloat(str)*1000)||0;
}

// ── HELPERS ───────────────────────────────────────────────────────
function fmtMs(ms){if(!ms||ms<=0)return'—';var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),mil=Math.floor((ms%1000)/10);return(m>0?m+':'+pad2(s):s)+'.'+pad2(mil);}
function pad2(n){return String(n).padStart(2,'0');}
function pctClass(p){return p>=97?'g':p>=90?'a':'r';}
function pctLabel(p){return p>=97?'ok-v':p>=90?'warn-v':'bad-v';}
function secLabel(type){return type==='warmup'||type==='CALENTAMIENTO'?'Calentamiento':type==='preserie'||type==='PRE-SERIE'?'Pre-serie':'Serie';}
function initials(name){return name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}

function allSessions(){
  var all=[];
  Object.values(DB.swimmers).forEach(function(sw){
    sw.sessions.forEach(function(s){all.push({sw:sw.name,session:s});});
  });
  return all.sort(function(a,b){return b.session.date.localeCompare(a.session.date);});
}

function swStats(sw){
  var allPcts=[],bestTimes={};
  sw.sessions.forEach(function(s){
    s.blocks.forEach(function(bl){
      bl.reps.forEach(function(r){
        if(r.comp){var p=parseFloat(r.comp.pctStr)||0;if(p>0&&p<500)allPcts.push(p);}
        var key=bl.distance;
        if(r.time>0&&(!bestTimes[key]||r.time<bestTimes[key]))bestTimes[key]=r.time;
      });
    });
  });
  var avg=allPcts.length?allPcts.reduce(function(a,b){return a+b;},0)/allPcts.length:0;
  var onT=allPcts.filter(function(p){return p>=90;}).length;
  return{sessions:sw.sessions.length,avg:avg,onTarget:onT,total:allPcts.length,bestTimes:bestTimes};
}

      months[mKey].forEach(function(item){

            s.blocks.forEach(function(bl){
              if(bl.distance&&bl.distance.toLowerCase().indexOf(comp.distance.toLowerCase().split(' ')[0])!==-1){
                bl.reps.forEach(function(r){if(r.time>0&&(!ref||r.time<ref))ref=r.time;});
              }
            });
          });
        }
        var compMs=parseTimeStr(comp.time);
        var diff=ref&&compMs?((compMs-ref)/1000).toFixed(3):'';

function parseTimeStr(str){
  if(!str)return 0;
  str=String(str).trim();
  if(str.indexOf(':')!==-1){var p=str.split(':');return Math.round((parseFloat(p[0])*60+parseFloat(p[1]))*1000);}
  return Math.round(parseFloat(str)*1000)||0;
}

function addComp(){
  var sw=document.getElementById('comp-sw').value;
  var date=document.getElementById('comp-date').value.trim();
  var name=document.getElementById('comp-name').value.trim();
  var dist=document.getElementById('comp-dist').value;
  var time=document.getElementById('comp-time').value.trim();
  var place=document.getElementById('comp-place').value.trim();
  if(!sw||!date||!name||!time){alert('Completá nadador, fecha, competencia y tiempo.');return;}
  var comps=getComps();
  comps.unshift({swimmer:sw,date:date,name:name,distance:dist,time:time,place:place,id:Date.now()});
  saveComps(comps);
  renderCompetitions();
  toast('✓ Resultado agregado');
}

function deleteComp(idx){
  if(!confirm('¿Eliminar este resultado?'))return;
  var comps=getComps();comps.splice(idx,1);saveComps(comps);renderCompetitions();
}

function renderControlTimes(sw){
  var controls=sw.controls||[];
  if(!controls.length)return'<div style="font-size:12px;color:var(--faint);padding:8px 0 12px">No hay tiempos de control registrados.</div>';
  var months={};var mOrder=[];
  controls.forEach(function(ct,ci){

    if(!months[mk]){months[mk]=[];mOrder.push(mk);}
    months[mk].push({ct:ct,idx:ci});
  });
  var html='';
  mOrder.forEach(function(mk){
    html+='<div class="ctrl-group-hdr">'+mk+'</div>';
    months[mk].forEach(function(item){
      var ct=item.ct;
      html+='<div class="ctrl-item">'+
        '<span class="ctrl-date">'+ct.date+'</span>'+

}

function initSwimmerCharts(sw){
  // Chart 1: intensity over sessions (serie blocks only, filtered pct <500)
  var labels=[],dataAvg=[],dataOnT=[];
  sw.sessions.slice().reverse().forEach(function(s){
    var pcts=[];
    s.blocks.forEach(function(bl){
      if(bl.type==='velocity'||bl.type==='rv'||bl.type==='serie'||bl.type==='SERIE')
        bl.reps.forEach(function(r){if(r.comp){var p=parseFloat(r.comp.pctStr)||0;if(p>0&&p<500)pcts.push(p);}});
    });
    if(!pcts.length)return;
    var avg=pcts.reduce(function(a,b){return a+b;},0)/pcts.length;
    var onT=pcts.filter(function(p){return p>=90;}).length;
    labels.push(s.date.split(',')[0]);
    dataAvg.push(Math.round(avg*10)/10);
    dataOnT.push(Math.round(onT/pcts.length*100));
  });

  var c1=document.getElementById('chart-intensity');
  if(c1&&labels.length){
    new Chart(c1,{type:'line',data:{labels:labels,datasets:[
      {label:'% Prom Serie',data:dataAvg,borderColor:'#3b9eff',backgroundColor:'rgba(59,158,255,.1)',tension:.3,pointRadius:4,pointBackgroundColor:'#3b9eff'},
      {label:'% En objetivo',data:dataOnT,borderColor:'#00d46e',backgroundColor:'rgba(0,212,110,.05)',tension:.3,pointRadius:4,pointBackgroundColor:'#00d46e',borderDash:[4,4]}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7fa0',font:{size:11}}}},scales:{x:{ticks:{color:'#6b7fa0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#6b7fa0',font:{size:10},callback:function(v){return v+'%'}},grid:{color:'rgba(255,255,255,.04)'},min:0,max:120}}}});
  }

  // Chart 2: best time per distance over sessions
  var distSet={};
  sw.sessions.slice().reverse().forEach(function(s,si){
    s.blocks.forEach(function(bl){
      bl.reps.forEach(function(r){
        if(r.time>0){
          if(!distSet[bl.distance])distSet[bl.distance]=[];
          if(!distSet[bl.distance][si]||r.time<distSet[bl.distance][si])
            distSet[bl.distance][si]=r.time;
        }
      });
    });
  });

  var sessLabels=sw.sessions.slice().reverse().map(function(s){return s.date.split(',')[0];});
  var colors=['#3b9eff','#00d46e','#ffb020','#9d6fff','#ff4f6b'];
  var datasets=Object.keys(distSet).slice(0,5).map(function(dist,i){
    return{label:dist,data:distSet[dist].map(function(v){return v?v/1000:null;}),borderColor:colors[i%colors.length],backgroundColor:'transparent',tension:.3,pointRadius:4,spanGaps:true};
  });

  var c2=document.getElementById('chart-times');
  if(c2&&datasets.length){
    new Chart(c2,{type:'line',data:{labels:sessLabels,datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7fa0',font:{size:11}}}},scales:{x:{ticks:{color:'#6b7fa0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#6b7fa0',font:{size:10},callback:function(v){return v+'s'}},grid:{color:'rgba(255,255,255,.04)'},reverse:true}}}});
  }
}

  if(period!=='all'){

    var cutoff=new Date();cutoff.setDate(cutoff.getDate()-weeks*7);
    sessions=sessions.filter(function(s){return true;}); // keep all for now
    sessions=sessions.slice(-weeks*2);
  }

  var st=swStats(sw);
  var rep=document.getElementById('prog-report');if(!rep)return;

        if(r.comp){var p=parseFloat(r.comp.pctStr)||0;if(p>0&&p<500){pcts.push(p);tot++;if(p>=90)onT++;}}
      });
    });
    var avg=pcts.length?pcts.reduce(function(a,b){return a+b;},0)/pcts.length:0;

  '<th style="padding:7px 10px;text-align:center;font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:500">En objetivo</th>'+
  '<th style="padding:7px 10px;text-align:center;font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:500">Mejor rep</th>'+
  '</tr></thead><tbody>';

      '<td style="padding:7px 10px;text-align:center;font-family:var(--mono)">'+(d.tot>0?d.onT+'/'+d.tot+' ('+Math.round(d.onT/d.tot*100)+'%)':'—')+'</td>'+
      '<td style="padding:7px 10px;text-align:center;font-family:var(--mono)">'+(d.best?fmtMs(d.best):'—')+'</td>'+

    if(c1&&labels.length){
      new Chart(c1,{type:'line',data:{labels:labels,datasets:[
        {label:'% Intensidad prom.',data:avgData,borderColor:'#3b9eff',backgroundColor:'rgba(59,158,255,.08)',tension:.3,pointRadius:5,pointBackgroundColor:'#3b9eff',fill:true},
        {label:'90% (objetivo)',data:labels.map(function(){return 90;}),borderColor:'rgba(0,212,110,.4)',borderDash:[6,4],pointRadius:0,fill:false}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7fa0',font:{size:11}}}},scales:{x:{ticks:{color:'#6b7fa0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#6b7fa0',callback:function(v){return v+'%'},font:{size:10}},grid:{color:'rgba(255,255,255,.04)'},min:50}}}});
    }

    var c2=document.getElementById('prog-chart-bar');
    if(c2&&labels.length){
      var onTData=sessData.map(function(d){return d.onT;});
      var offTData=sessData.map(function(d){return Math.max(0,d.tot-d.onT);});
      new Chart(c2,{type:'bar',data:{labels:labels,datasets:[
        {label:'En objetivo',data:onTData,backgroundColor:'rgba(0,212,110,.7)',borderRadius:3},
        {label:'Fuera',data:offTData,backgroundColor:'rgba(255,79,107,.5)',borderRadius:3}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7fa0',font:{size:11}}}},scales:{x:{ticks:{color:'#6b7fa0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'},stacked:true},y:{ticks:{color:'#6b7fa0',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'},stacked:true}}}});
    }
  },100);
}

// SESSION MODAL
function openSessionModal(swName,idx){
  var sw=DB.swimmers[swName];if(!sw)return;
  var s=sw.sessions[idx];if(!s)return;
  showSessionModal(swName,s);
}
function openSessionModalByName(swName,id){
  var sw=DB.swimmers[swName];if(!sw)return;
  var s=sw.sessions.find(function(x){return String(x.id)===String(id);});if(!s)return;
  showSessionModal(swName,s);
}
function openSessionWithPdf(swName,id){openSessionModalByName(swName,id);}
function showSessionModal(swName,s){
  document.getElementById('modal-title').textContent=swName+' — '+s.date;
  // Add PDF button to modal header
  var pdfBtn=document.createElement('button');
  pdfBtn.textContent='↓ PDF';
  pdfBtn.style.cssText='margin-left:10px;padding:4px 12px;border-radius:5px;border:.5px solid var(--bb);background:var(--bd);color:var(--blue);font-size:11px;cursor:pointer;font-family:var(--body);';
  pdfBtn.addEventListener('click',function(){printSessionPDF(swName,s.id);});
  var titleEl=document.getElementById('modal-title');
  titleEl.textContent=swName+' — '+s.date;
  titleEl.appendChild(pdfBtn);
  var body=document.getElementById('modal-body');
  var html='<div style="font-size:12px;color:var(--muted);margin-bottom:14px">'+esc(s.sessionType||'')+(s.phase?' · '+esc(s.phase):'')+'</div>';

  // Group by section
  var sections={warmup:[],preserie:[],serie:[]};
  s.blocks.forEach(function(bl){
    var t=bl.type;
    if(t==='warmup'||t==='CALENTAMIENTO')sections.warmup.push(bl);
    else if(t==='preserie'||t==='PRE-SERIE')sections.preserie.push(bl);
    else sections.serie.push(bl);
  });

  [['warmup','Calentamiento'],['preserie','Pre-serie'],['serie','Serie']].forEach(function(pair){
    var key=pair[0],label=pair[1];
    if(!sections[key].length)return;
    html+='<div class="section-label">'+label+'</div>';
    sections[key].forEach(function(bl){
      var blPcts=bl.reps.filter(function(r){return r.comp;}).map(function(r){return parseFloat(r.comp.pctStr)||0;}).filter(function(p){return p>0&&p<500;});
      var blAvg=blPcts.length?blPcts.reduce(function(a,b){return a+b;},0)/blPcts.length:0;
      html+='<div style="font-size:11px;color:var(--muted);margin:4px 0 3px;padding-left:2px">'+esc(bl.name)+' · '+bl.distance+(blAvg>0?' · <span class="'+pctLabel(blAvg)+'">'+blAvg.toFixed(1)+'%</span>':'')+'</div>';
      html+='<table class="rep-tbl"><thead><tr><th>#</th><th>Tiempo</th><th>Objetivo</th><th>Diferencia</th><th>%</th><th>Estado</th><th>Descanso</th></tr></thead><tbody>';
      bl.reps.forEach(function(r){
        var p=r.comp?parseFloat(r.comp.pctStr)||0:0;
        var rowCls=r.comp?(p>=90?'ok':'bad'):'';
        var valCls=p>0?pctLabel(p):'';
        html+='<tr class="'+rowCls+'">'+
          '<td>'+r.n+'</td>'+
          '<td class="'+valCls+'">'+fmtMs(r.time)+'</td>'+
          '<td style="color:var(--muted)">'+fmtMs(r.targetMs)+'</td>'+
          '<td class="'+valCls+'">'+(r.comp?r.comp.diffStr:'—')+'</td>'+
          '<td class="'+valCls+'" style="font-weight:500">'+(r.comp?r.comp.pctStr:'—')+'</td>'+
          '<td style="color:'+(rowCls==='ok'?'var(--green)':'var(--red)')+'">'+
            (r.comp?(p>=90?'✓':'✗'):'—')+'</td>'+
          '<td style="color:var(--muted)">'+fmtMs(r.restTime)+'</td>'+
        '</tr>';
      });
      html+='</tbody></table>';
    });
  });

  body.innerHTML=html;
  document.getElementById('session-modal').className='modal-overlay open';
}
function closeModal(){document.getElementById('session-modal').className='modal-overlay';}

// TABS
function showTab(v){
  ['swimmers','sessions','progress','detail','competitions'].forEach(function(id){
    document.getElementById('view-'+id).className='view';
    var t=document.getElementById('tab-'+id);if(t)t.className='tab';
  });
  document.getElementById('view-'+v).className='view active';
  var t=document.getElementById('tab-'+v);if(t)t.className='tab active';
  if(v==='sessions')renderSessions();
  if(v==='progress')renderProgress();
  if(v==='swimmers')renderSwimmers();
  if(v==='competitions')renderCompetitions();
}

// TOAST
function toast(msg,err){
  var el=document.getElementById('import-toast');
  el.textContent=msg;
  el.style.display='block';
  el.style.borderColor=err?'var(--rb)':'var(--gb)';
  el.style.color=err?'var(--red)':'var(--green)';
  setTimeout(function(){el.style.display='none';},3000);
}

// INIT
renderAll();
</script>
